name: publish-rust

# Publishes the Rust ygg crate to crates.io.
#
# Triggers:
#   - push a tag like ``ygg-rust-v0.1.0`` (must match the version in Cargo.toml)
#   - or run manually from the Actions tab (workflow_dispatch) with an optional dry run
#
# Requires a ``CARGO_REGISTRY_TOKEN`` repo secret: a crates.io API token
# (crates.io → Account Settings → API Tokens) with publish scope for the crate.

on:
  push:
    tags:
      - "ygg-rust-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + package only (no publish)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-ygg-rust
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish to crates.io
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/ygg-rust-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ygg-rust-v}"
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "tag=$TAG_VERSION crate=$CRATE_VERSION"
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "::error ::Tag version ($TAG_VERSION) does not match Cargo.toml ($CRATE_VERSION)"
            exit 1
          fi

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      - name: Package (sanity — lists the published files)
        run: cargo package --list

      - name: Publish to crates.io
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

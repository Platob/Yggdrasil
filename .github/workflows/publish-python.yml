name: publish-python

# Builds the `ygg` Python package — a maturin-built extension wrapping the
# Rust ygg-core engine — and publishes it to PyPI.
#
# Triggers:
#   - push a tag like ``ygg-python-v0.1.0`` (must match python/Cargo.toml version)
#   - or run manually (workflow_dispatch) with an optional dry run (build only)
#
# PyPI auth: trusted publishing (OIDC) when repo variable
# PYPI_TRUSTED_PUBLISHING == 'true', otherwise the PYPI_API_TOKEN secret.

on:
  push:
    tags:
      - "ygg-python-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build wheels + sdist only (no publish)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-python
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # build-wheels — compiled wheels across platforms via maturin
  # --------------------------------------------------------------------------
  build-wheels:
    name: Wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  manylinux: auto }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, manylinux: auto }
          - { os: macos-latest,   target: aarch64-apple-darwin,      manylinux: "" }
          - { os: macos-13,       target: x86_64-apple-darwin,       manylinux: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    manylinux: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --find-interpreter

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # build-sdist — source distribution
  # --------------------------------------------------------------------------
  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # publish — upload all artifacts to PyPI
  # --------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: ${{ github.event_name == 'push' || inputs.dry_run == false }}

    environment:
      name: pypi
      url: https://pypi.org/project/ygg/

    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish via trusted publishing (OIDC)
        if: vars.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

      - name: Publish via API token
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Write success summary
        run: |
          {
            echo "## ✅ Published \`ygg\` to PyPI"
            echo ""
            echo "🔗 https://pypi.org/project/ygg/"
          } >> "$GITHUB_STEP_SUMMARY"

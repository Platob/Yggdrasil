# ============================================================================
# publish.yml
#
# Builds and publishes the `ygg` package to PyPI as a sdist + a matrix
# of native wheels. Versioned from the single source of truth:
# python/pyproject.toml.
#
# `ygg` is no longer pure-Python: ``python/src/yggdrasil/io/_url.pyx``
# (and any future ``.pyx`` siblings) compiles into a C extension at
# build time. The sdist still ships the ``.pyx`` source so users
# without pre-built wheels can build locally; the wheel matrix below
# covers cpython 3.10–3.13 on linux x86_64 / aarch64, macos
# arm64 / x86_64, and windows x86_64.
#
# Pairs with publish-native.yml (the `yggrs` Rust wheels, kept around
# for transition; the URL hot path has migrated to Cython embedded in
# `ygg` itself).
#
# Jobs
# ----
#   detect             → reads version, checks ygg on PyPI, decides
#   build-sdist        → ygg-X.Y.Z.tar.gz (with .pyx sources)
#   build-wheels       → cibuildwheel matrix: linux/macos/windows × cp3{10..13}
#   publish-python     → uploads sdist + every wheel to PyPI
#   tag                → creates vX.Y.Z git tag + GitHub Release
#   cleanup-previous   → opt-in: removes previous tag/release on
#                        ``!cleanup-prev-release`` commit marker
#   skip               → summary when publish is intentionally skipped
#
# Commit conventions
# ------------------
# Include the literal token ``!cleanup-prev-release`` anywhere in any
# commit message on the push to ask CI to delete the previous git tag
# + GitHub Release after the new one publishes. PyPI yanking has to be
# confirmed manually (no public API); the workflow summary links the
# release management page.
#
# PyPI setup required
# -------------------
# environment "pypi" with trusted publisher OR secret PYPI_API_TOKEN.
# Set repo variable PYPI_TRUSTED_PUBLISHING = 'true' to opt into OIDC;
# otherwise the token-based fallback is used automatically.
# ============================================================================

name: 🚀 Publish ygg

on:
  push:
    branches:
      - main
    paths:
      - "python/src/**"
      - "python/setup.py"
      - "python/pyproject.toml"
      - "python/README.md"
      - "python/LICENSE"
      - ".github/workflows/publish.yml"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish even if version already exists on PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # detect — version gate
  # --------------------------------------------------------------------------
  detect:
    name: Detect version & decide
    runs-on: ubuntu-latest

    outputs:
      version:           ${{ steps.meta.outputs.version }}
      should_publish:    ${{ steps.decision.outputs.should_publish }}
      cleanup_previous:  ${{ steps.cleanup.outputs.cleanup_previous }}
      previous_tag:      ${{ steps.cleanup.outputs.previous_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from python/pyproject.toml
        id: meta
        run: |
          VERSION=$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("python/pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(m.group(1))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Check ygg on PyPI
        id: pypi
        env:
          VER: ${{ steps.meta.outputs.version }}
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/ygg/${VER}/json" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "⚠️  ygg v${VER} is already on PyPI."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ ygg v${VER} is not on PyPI yet."
          fi

      - name: Decide
        id: decision
        env:
          EXISTS: ${{ steps.pypi.outputs.exists }}
          FORCE:  ${{ github.event.inputs.force_publish || 'false' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ "$EXISTS" = "false" ] || [ "$FORCE" = "true" ] || [ "$IS_TAG" = "true" ]; then
            echo "should_publish=true"  >> "$GITHUB_OUTPUT"
            echo "🚀 Will publish ygg v${{ steps.meta.outputs.version }}."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Skipping – version already on PyPI and force=false."
          fi

      # Convention: any commit on the push that carries the literal token
      # ``!cleanup-prev-release`` in its message asks CI to remove the
      # previous release after this one publishes (GitHub tag + release,
      # and a PyPI yank for the previous version). The marker is opt-in
      # per push so routine releases stay non-destructive.
      - name: Detect cleanup-prev-release marker
        id: cleanup
        env:
          CURRENT: ${{ steps.meta.outputs.version }}
        run: |
          MARKER='!cleanup-prev-release'
          # Look at every commit on this push, not just HEAD — a release
          # often lands in a merge that doesn't itself carry the marker.
          if git log --format='%B' ${{ github.event.before }}..${{ github.sha }} 2>/dev/null \
               | grep -qF "$MARKER" \
             || git log -1 --format='%B' ${{ github.sha }} | grep -qF "$MARKER"; then
            CLEANUP=true
          else
            CLEANUP=false
          fi

          # Resolve previous tag: highest semver v* tag below the current
          # version. Skip the new version's own tag if it's already pushed.
          PREV=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
                 | grep -vx "v$CURRENT" \
                 | head -n1)
          echo "cleanup_previous=$CLEANUP" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREV" >> "$GITHUB_OUTPUT"
          if [ "$CLEANUP" = "true" ]; then
            echo "🧹 Cleanup marker found; previous_tag=${PREV:-<none>}"
          else
            echo "ℹ️  No !cleanup-prev-release marker; previous release will be kept."
          fi

  # --------------------------------------------------------------------------
  # build-sdist — source distribution (contains .pyx for from-source installs)
  # --------------------------------------------------------------------------
  build-sdist:
    name: Build ygg sdist
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist/

      - name: List sdist
        run: ls -lh dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: ygg-sdist-${{ needs.detect.outputs.version }}
          path: python/dist/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # build-wheels — native wheel matrix via cibuildwheel
  # --------------------------------------------------------------------------
  #
  # Each runner job spawns cibuildwheel which iterates over the cpython
  # ABIs declared in ``[tool.cibuildwheel]`` (pyproject.toml). Linux
  # aarch64 cross-builds via QEMU (slow but reliable); the other archs
  # use native runners for the right host arch.
  build-wheels:
    name: Build ygg wheel (${{ matrix.target.os }}/${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'

    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: x86_64,  runner: ubuntu-latest,  cibw_archs: "x86_64" }
          - { os: linux,   arch: aarch64, runner: ubuntu-latest,  cibw_archs: "aarch64" }
          - { os: windows, arch: x86_64,  runner: windows-latest, cibw_archs: "AMD64" }
          - { os: macos,   arch: x86_64,  runner: macos-13,       cibw_archs: "x86_64" }
          - { os: macos,   arch: arm64,   runner: macos-14,       cibw_archs: "arm64" }

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Required for linux aarch64 cross-build only. ``docker/setup-qemu-action``
      # binfmt-registers the foreign arch so the manylinux/musllinux
      # cibuildwheel container can execute aarch64 binaries on an x86_64
      # runner. No-op on other matrix legs.
      - name: Set up QEMU (linux aarch64 only)
        if: matrix.target.os == 'linux' && matrix.target.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.target.cibw_archs }}
        with:
          package-dir: python
          output-dir: python/wheelhouse
          # The remaining knobs (build / skip / test-command /
          # manylinux-image) live in ``[tool.cibuildwheel]`` so they
          # stay in lockstep with the project metadata. Changing them
          # here without updating pyproject would silently diverge.

      - name: List wheels
        run: ls -lh wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ygg-wheels-${{ matrix.target.os }}-${{ matrix.target.arch }}-${{ needs.detect.outputs.version }}
          path: python/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # publish-python — gather sdist + every wheel, upload to PyPI in one shot
  # --------------------------------------------------------------------------
  publish-python:
    name: Publish ygg to PyPI
    runs-on: ubuntu-latest
    needs: [detect, build-sdist, build-wheels]
    if: needs.detect.outputs.should_publish == 'true'

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/ygg/${{ needs.detect.outputs.version }}/

    steps:
      - name: Download all ygg artifacts
        uses: actions/download-artifact@v4
        with:
          # Pull every ``ygg-sdist-*`` + ``ygg-wheels-*`` artifact for this
          # version into ``dist/`` (one upload step → one PyPI release).
          pattern: ygg-*-${{ needs.detect.outputs.version }}
          path: dist/
          merge-multiple: true

      - name: List release dist contents
        run: ls -lh dist/

      - name: Publish via trusted publishing (OIDC)
        if: vars.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true

      - name: Install uv (for token-based fallback)
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Publish via API token
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*

      - name: Write success summary
        run: |
          {
            echo "## ✅ Published \`ygg\` v${{ needs.detect.outputs.version }}"
            echo ""
            echo "🔗 https://pypi.org/project/ygg/${{ needs.detect.outputs.version }}/"
            echo ""
            echo "Uploaded:"
            for f in dist/*; do echo "- \`$(basename "$f")\`"; done
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # tag — git tag + GitHub Release containing ygg dist files
  # --------------------------------------------------------------------------
  tag:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [detect, publish-python]
    if: >-
      needs.detect.outputs.should_publish == 'true'
      && needs.publish-python.result == 'success'
      && !startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag v${{ needs.detect.outputs.version }}
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⏭️  Tag $TAG already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "$TAG"
            echo "🏷️  Created and pushed tag $TAG"
          fi

      - name: Download all ygg artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ygg-*-${{ needs.detect.outputs.version }}
          path: release/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ needs.detect.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create "$TAG" release/* \
            --title "Release ${TAG}" \
            --generate-notes \
            --verify-tag

      - name: Write release summary
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          {
            echo "## 🏷️ Tagged & Released \`v${VERSION}\`"
            echo ""
            echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`v${VERSION}\` |"
            echo "| PyPI (\`ygg\`) | https://pypi.org/project/ygg/${VERSION}/ |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # cleanup-previous — opt-in via !cleanup-prev-release commit marker
  # --------------------------------------------------------------------------
  #
  # When any commit on the push carries the literal token
  # ``!cleanup-prev-release`` in its message, this job deletes the prior
  # ``vX.Y.Z`` git tag + GitHub Release and yanks the prior PyPI version.
  # The marker is opt-in per push so routine releases stay non-destructive.
  # PyPI's public API does not expose a yank endpoint; the maintainer-side
  # yank link is surfaced in the workflow summary as the source of truth.
  cleanup-previous:
    name: Cleanup previous release
    runs-on: ubuntu-latest
    needs: [detect, tag]
    if: >-
      needs.detect.outputs.cleanup_previous == 'true'
      && needs.tag.result == 'success'
      && needs.detect.outputs.previous_tag != ''

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete previous GitHub Release + tag
        env:
          GH_TOKEN: ${{ github.token }}
          PREV:     ${{ needs.detect.outputs.previous_tag }}
        run: |
          echo "🧹 Deleting GitHub Release + tag $PREV"
          gh release delete "$PREV" --cleanup-tag --yes
          echo "✅ Removed $PREV from GitHub"

      - name: Yank previous PyPI version
        env:
          PREV: ${{ needs.detect.outputs.previous_tag }}
        run: |
          VERSION="${PREV#v}"
          MANAGE_URL="https://pypi.org/manage/project/ygg/release/${VERSION}/"
          # PyPI does not expose a public token-authenticated yank endpoint;
          # surface the manage URL so the maintainer can yank in one click.
          echo "::warning ::PyPI yank for ygg ${VERSION} must be confirmed manually at ${MANAGE_URL}"
          {
            echo "## 🧹 Cleaned up previous release \`${PREV}\`"
            echo ""
            echo "- GitHub tag + Release: deleted"
            echo "- PyPI \`ygg ${VERSION}\`: **yank manually** at ${MANAGE_URL}"
            echo ""
            echo "_PyPI does not expose a public yank API; once the official"
            echo "endpoint stabilises, wire it in here._"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # skip-summary — posted when nothing needs to be published
  # --------------------------------------------------------------------------
  skip-summary:
    name: Skip summary
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'false'

    steps:
      - name: Write skip summary
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          {
            echo "## ⏭️ Skipped — nothing to publish"
            echo ""
            echo "\`ygg\` v${VERSION} is already on PyPI."
            echo ""
            echo "Re-run with **force_publish = true** to override."
          } >> "$GITHUB_STEP_SUMMARY"

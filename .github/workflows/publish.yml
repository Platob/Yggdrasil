# ============================================================================
# publish.yml
#
# Builds and publishes the `ygg` pure-Python package to PyPI.
# Versioned from the single source of truth: python/pyproject.toml.
#
# Jobs
# ----
#   detect         → reads version, checks ygg on PyPI, decides
#   build-python   → sdist + pure-Python wheel (uv / setuptools)
#   publish-python → uploads ygg dist to PyPI
#   tag            → creates vX.Y.Z git tag + GitHub Release
#   skip           → summary when publish is intentionally skipped
#
# PyPI setup required
# -------------------
# environment "pypi" with trusted publisher OR secret PYPI_API_TOKEN.
# Set repo variable PYPI_TRUSTED_PUBLISHING = 'true' to opt into OIDC;
# otherwise the token-based fallback is used automatically.
# ============================================================================

name: 🚀 Publish ygg

on:
  push:
    branches:
      - main
    paths:
      - "python/src/**"
      - "python/pyproject.toml"
      - "python/README.md"
      - "python/LICENSE"
      - ".github/workflows/publish.yml"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish even if version already exists on PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # detect — version gate
  # --------------------------------------------------------------------------
  detect:
    name: Detect version & decide
    runs-on: ubuntu-latest

    outputs:
      version:        ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.decision.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from python/pyproject.toml
        id: meta
        run: |
          VERSION=$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("python/pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(m.group(1))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Check ygg on PyPI
        id: pypi
        env:
          VER: ${{ steps.meta.outputs.version }}
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/ygg/${VER}/json" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "⚠️  ygg v${VER} is already on PyPI."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ ygg v${VER} is not on PyPI yet."
          fi

      - name: Decide
        id: decision
        env:
          EXISTS: ${{ steps.pypi.outputs.exists }}
          FORCE:  ${{ github.event.inputs.force_publish || 'false' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ "$EXISTS" = "false" ] || [ "$FORCE" = "true" ] || [ "$IS_TAG" = "true" ]; then
            echo "should_publish=true"  >> "$GITHUB_OUTPUT"
            echo "🚀 Will publish ygg v${{ steps.meta.outputs.version }}."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Skipping – version already on PyPI and force=false."
          fi

  # --------------------------------------------------------------------------
  # build-python — pure-Python sdist + wheel
  # --------------------------------------------------------------------------
  build-python:
    name: Build ygg (pure Python)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build --no-sources

      - name: Verify dist contents
        run: ls -lh dist/

      - name: Upload python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ needs.detect.outputs.version }}
          path: python/dist/
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # publish-python — upload ygg to PyPI
  # --------------------------------------------------------------------------
  publish-python:
    name: Publish ygg to PyPI
    runs-on: ubuntu-latest
    needs: [detect, build-python]
    if: needs.detect.outputs.should_publish == 'true'

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/ygg/${{ needs.detect.outputs.version }}/

    steps:
      - name: Download python dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.detect.outputs.version }}
          path: dist/

      - name: Publish via trusted publishing (OIDC)
        if: vars.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true

      - name: Install uv (for token-based fallback)
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Publish via API token
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*

      - name: Write success summary
        run: |
          {
            echo "## ✅ Published \`ygg\` v${{ needs.detect.outputs.version }}"
            echo ""
            echo "🔗 https://pypi.org/project/ygg/${{ needs.detect.outputs.version }}/"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # tag — git tag + GitHub Release containing ygg dist files
  # --------------------------------------------------------------------------
  tag:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [detect, publish-python]
    if: >-
      needs.detect.outputs.should_publish == 'true'
      && needs.publish-python.result == 'success'
      && !startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag v${{ needs.detect.outputs.version }}
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⏭️  Tag $TAG already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "$TAG"
            echo "🏷️  Created and pushed tag $TAG"
          fi

      - name: Download python dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.detect.outputs.version }}
          path: release/

      - name: List release assets
        run: ls -lh release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ needs.detect.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create "$TAG" release/* \
            --title "Release ${TAG}" \
            --generate-notes \
            --verify-tag

      - name: Write release summary
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          {
            echo "## 🏷️ Tagged & Released \`v${VERSION}\`"
            echo ""
            echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`v${VERSION}\` |"
            echo "| PyPI (\`ygg\`) | https://pypi.org/project/ygg/${VERSION}/ |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # skip-summary — posted when nothing needs to be published
  # --------------------------------------------------------------------------
  skip-summary:
    name: Skip summary
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'false'

    steps:
      - name: Write skip summary
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          {
            echo "## ⏭️ Skipped — nothing to publish"
            echo ""
            echo "\`ygg\` v${VERSION} is already on PyPI."
            echo ""
            echo "Re-run with **force_publish = true** to override."
          } >> "$GITHUB_STEP_SUMMARY"


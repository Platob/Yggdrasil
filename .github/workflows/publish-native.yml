# ============================================================================
# publish-native.yml
#
# Builds and publishes the `yggrs` Rust acceleration wheels alongside the
# pure-Python `ygg` package. The version is read from python/pyproject.toml
# and stamped into rust/pyproject.toml at build time so both packages
# always release at the same version.
#
# Jobs
# ----
#   detect           → reads version, checks yggrs on PyPI, decides
#   build-wheels     → matrix of native wheels (linux x86_64+aarch64,
#                      windows-x86_64, macos-arm64, macos-x86_64) + sdist
#   publish-native   → uploads yggrs dist to PyPI
#   skip-summary     → posted when nothing needs to be published
#
# Trigger contract
# ----------------
# Runs on the same push/tag/dispatch events as publish.yml so the two
# workflows release together. publish.yml does NOT depend on this
# workflow finishing — they run in parallel; if one fails the other
# still publishes (so you can retry the broken side without rebuilding
# the working one).
# ============================================================================

name: 🦀 Publish yggrs

on:
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - "python/pyproject.toml"
      - ".github/workflows/publish-native.yml"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish even if version already exists on PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: publish-native
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # --------------------------------------------------------------------------
  # detect — version gate (mirrors the ygg detect job)
  # --------------------------------------------------------------------------
  detect:
    name: Detect version & decide
    runs-on: ubuntu-latest

    outputs:
      version:        ${{ steps.meta.outputs.version }}
      should_publish: ${{ steps.decision.outputs.should_publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from python/pyproject.toml
        id: meta
        run: |
          VERSION=$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("python/pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(m.group(1))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Check yggrs on PyPI
        id: pypi
        env:
          VER: ${{ steps.meta.outputs.version }}
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/yggrs/${VER}/json" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "⚠️  yggrs v${VER} is already on PyPI."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ yggrs v${VER} is not on PyPI yet."
          fi

      - name: Decide
        id: decision
        env:
          EXISTS: ${{ steps.pypi.outputs.exists }}
          FORCE:  ${{ github.event.inputs.force_publish || 'false' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ "$EXISTS" = "false" ] || [ "$FORCE" = "true" ] || [ "$IS_TAG" = "true" ]; then
            echo "should_publish=true"  >> "$GITHUB_OUTPUT"
            echo "🚀 Will publish yggrs v${{ steps.meta.outputs.version }}."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Skipping – version already on PyPI and force=false."
          fi

  # --------------------------------------------------------------------------
  # stamp-version — sync rust/pyproject.toml to the canonical version
  # before the build matrix runs.
  # --------------------------------------------------------------------------
  stamp-version:
    name: Stamp rust/pyproject.toml version
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'

    outputs:
      stamped: ${{ steps.stamp.outputs.stamped }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp
        id: stamp
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          python3 - <<'PY'
          import os, pathlib, re
          version = os.environ['VERSION']
          for path in ('rust/pyproject.toml', 'rust/Cargo.toml'):
              p = pathlib.Path(path)
              text = p.read_text()
              # Only the first top-level `version = "..."` is the package
              # version. Cargo's [package] block has the version first;
              # rust/pyproject.toml's [project] block likewise. count=1
              # avoids accidentally rewriting a transitive `version =`.
              text = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  text,
                  count=1,
              )
              p.write_text(text)
              print(f'stamped {path} → {version}')
          PY
          echo "stamped=true" >> "$GITHUB_OUTPUT"

      - name: Upload stamped sources
        uses: actions/upload-artifact@v4
        with:
          name: rust-src-${{ needs.detect.outputs.version }}
          path: |
            rust/
            !rust/target/
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # build-wheels — native wheel matrix
  # --------------------------------------------------------------------------
  build-wheels:
    name: Build yggrs wheel (${{ matrix.target.os }}/${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    needs: [detect, stamp-version]
    if: needs.detect.outputs.should_publish == 'true'

    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: x86_64,  runner: ubuntu-latest,   maturin_target: x86_64-unknown-linux-gnu }
          - { os: linux,   arch: aarch64, runner: ubuntu-latest,   maturin_target: aarch64-unknown-linux-gnu }
          - { os: windows, arch: x86_64,  runner: windows-latest,  maturin_target: x86_64-pc-windows-msvc }
          - { os: macos,   arch: x86_64,  runner: macos-13,        maturin_target: x86_64-apple-darwin }
          - { os: macos,   arch: arm64,   runner: macos-14,        maturin_target: aarch64-apple-darwin }

    steps:
      - name: Download stamped sources
        uses: actions/download-artifact@v4
        with:
          name: rust-src-${{ needs.detect.outputs.version }}
          path: rust/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel (linux uses QEMU for aarch64)
        if: matrix.target.os == 'linux'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          target: ${{ matrix.target.maturin_target }}
          manylinux: auto
          args: --release --out dist --strip
          # auto-install QEMU when cross-arch (aarch64) is requested
          rust-toolchain: stable

      - name: Build wheel (macos / windows)
        if: matrix.target.os != 'linux'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          target: ${{ matrix.target.maturin_target }}
          args: --release --out dist --strip
          rust-toolchain: stable

      - name: Upload native wheel
        uses: actions/upload-artifact@v4
        with:
          name: yggrs-${{ matrix.target.os }}-${{ matrix.target.arch }}-${{ needs.detect.outputs.version }}
          path: rust/dist/*.whl
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # build-sdist — single sdist for completeness
  # --------------------------------------------------------------------------
  build-sdist:
    name: Build yggrs sdist
    runs-on: ubuntu-latest
    needs: [detect, stamp-version]
    if: needs.detect.outputs.should_publish == 'true'

    steps:
      - name: Download stamped sources
        uses: actions/download-artifact@v4
        with:
          name: rust-src-${{ needs.detect.outputs.version }}
          path: rust/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: yggrs-sdist-${{ needs.detect.outputs.version }}
          path: rust/dist/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # publish-native — collect wheels + sdist, upload to PyPI
  # --------------------------------------------------------------------------
  publish-native:
    name: Publish yggrs to PyPI
    runs-on: ubuntu-latest
    needs: [detect, build-wheels, build-sdist]
    if: needs.detect.outputs.should_publish == 'true'

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/yggrs/${{ needs.detect.outputs.version }}/

    steps:
      - name: Download all yggrs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: yggrs-*-${{ needs.detect.outputs.version }}
          merge-multiple: true
          path: dist/

      - name: Verify dist contents
        run: ls -lh dist/

      - name: Publish via trusted publishing (OIDC)
        if: vars.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true

      - name: Install uv (for token-based fallback)
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Publish via API token
        if: vars.PYPI_TRUSTED_PUBLISHING != 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*

      - name: Write success summary
        run: |
          {
            echo "## ✅ Published \`yggrs\` v${{ needs.detect.outputs.version }}"
            echo ""
            echo "🔗 https://pypi.org/project/yggrs/${{ needs.detect.outputs.version }}/"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # skip-summary
  # --------------------------------------------------------------------------
  skip-summary:
    name: Skip summary
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_publish == 'false'

    steps:
      - name: Write skip summary
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          {
            echo "## ⏭️ Skipped — nothing to publish"
            echo ""
            echo "\`yggrs\` v${VERSION} is already on PyPI."
            echo ""
            echo "Re-run with **force_publish = true** to override."
          } >> "$GITHUB_STEP_SUMMARY"

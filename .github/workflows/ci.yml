# ============================================================================
# ci.yml
#
# Validation gate for every push / PR to main — the publish workflows
# assume the tree is healthy; this is what makes that true.
#
# - python-tests: full pytest suite minus the `spark` marker (JVM boot
#   is benchmarked separately) — integration-marked tests self-skip
#   when DATABRICKS_HOST is absent.
# - python-lint: ruff with the rule set in python/pyproject.toml.
#   (mypy is configured but not gated yet — see [tool.mypy] there.)
# - js: tsc --noEmit + vitest for the packages/yggdrasil port.
# ============================================================================

name: ✅ CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_SYSTEM_PYTHON: "1"

jobs:
  python-tests:
    name: Python tests (no spark)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package + test extras
        run: uv pip install -e ".[dev,pickle,api,excel]" pyspark

      - name: Run pytest
        run: python -m pytest tests -q -m "not spark"

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff
        run: uvx ruff@0.15.16 check src tests

  js:
    name: JS/TS typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/yggdrasil

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Run vitest
        run: npm test

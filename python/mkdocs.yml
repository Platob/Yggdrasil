site_name: Yggdrasil
site_description: Schema-aware data interchange for Python, Arrow, Polars, pandas, Spark, and Databricks.
site_url: https://platob.github.io/Yggdrasil/
site_author: Yggdrasil contributors

repo_url: https://github.com/Platob/Yggdrasil
repo_name: Platob/Yggdrasil
edit_uri: edit/main/python/docs/

copyright: Apache-2.0 — built with Material for MkDocs

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Match system
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: https://raw.githubusercontent.com/Platob/Yggdrasil/main/powerquery/Yggdrasil32.png
  logo: https://raw.githubusercontent.com/Platob/Yggdrasil/main/powerquery/Yggdrasil32.png

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Platob/Yggdrasil
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ygg/
      name: ygg on PyPI

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: Platob
      repo: Yggdrasil
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            members_order: source
            heading_level: 2
            inherited_members: true
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_if_no_docstring: false
            unwrap_annotated: true
            filters:
              - "!^_"
              - "^__init__$"
  - gen-files:
      scripts:
        - docs/_scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Architecture: guides/architecture.md
      - Data Model: guides/data-model.md
      - Casting: guides/casting.md
      - IO & HTTP: guides/io-http.md
      - Bot & Mesh: guides/bot.md
      - Execution Plans & SQL: guides/plan.md
      - Databricks: guides/databricks.md
      - Databricks CLI: guides/databricks-cli.md
      - Development: guides/development.md
  - Module Walkthrough:
      - Index: modules.md
      - All pages: modules/README.md
      - Core:
          - arrow: modules/arrow/README.md
          - data.cast: modules/types/README.md
          - engine cast helpers: modules/types/cast/README.md
          - dataclasses: modules/dataclasses/README.md
      - IO & HTTP:
          - io: modules/io/README.md
          - http_: modules/http_/README.md
      - Databricks:
          - Overview: modules/databricks/README.md
          - sql: modules/databricks/sql/README.md
          - compute: modules/databricks/compute/README.md
          - compute.remote: modules/databricks/compute/remote/README.md
          - job: modules/databricks/job/README.md
          - workspaces: modules/databricks/workspaces/README.md
          - fs: modules/databricks/fs/README.md
          - secrets: modules/databricks/secrets/README.md
          - iam: modules/databricks/iam/README.md
          - account: modules/databricks/account/README.md
      - Serialization:
          - pickle + json: modules/pickle/README.md
      - Execution Plans:
          - plan: modules/plan/README.md
      - Engines:
          - polars / pandas / spark: modules/engines/README.md
      - Databricks (extended):
          - catalog / schema / table / column: modules/databricks/catalog/README.md
          - volume: modules/databricks/volume/README.md
          - warehouse: modules/databricks/warehouse/README.md
          - cluster: modules/databricks/cluster/README.md
          - ai (Vector Search): modules/databricks/ai/README.md
      - Storage & Databases:
          - aws: modules/aws/README.md
          - delta: modules/delta/README.md
      - Domain:
          - jwt: modules/jwt/README.md
          - exceptions: modules/exceptions/README.md
      - Utilities:
          - pyutils: modules/pyutils/README.md
          - concurrent: modules/concurrent/README.md
          - optional libs: modules/libs/README.md
          - extension helpers: modules/libs/extensions/README.md
          - deltalake (status): modules/deltalake/README.md
  - API Reference:
      - Overview: api/index.md
      - Browse: reference/

exclude_docs: |
  /README.md
  _scripts/*

watch:
  - src/yggdrasil
  - docs

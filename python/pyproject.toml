[build-system]
# bump setuptools so type-info files are handled sanely
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ygg"
version = "0.5.39"
description = "Type-friendly utilities for moving data between Python objects, Arrow, Polars, Pandas, Spark, and Databricks"
readme = { file = "README.md", content-type = "text/markdown" }
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Yggdrasil contributors" }]
keywords = ["arrow", "polars", "pandas", "spark", "databricks", "typing", "dataclass", "serialization"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Typing :: Typed",
]
dependencies = [
  "pyarrow>=20",
]

[project.optional-dependencies]
# --- local dev tooling ---
dev = [
  "pytest",
  "pytest-asyncio",
  "black",
  "ruff",
  "mypy",
  "build",
  "twine",
]

http = [
  "urllib3",
]

data = [
  "pandas>=2.1",
  "polars>=1.3",
  "numpy>=1.26",
]

bigdata = [
  "pyspark>=3.5",
  "delta-spark>=3.2",
]

databricks = [
  "databricks-sdk>=0.92",
]

pickle = [
  "cloudpickle",
  "dill>=0.4",
  "zstandard",
  "xxhash",
  "blake3",
]

api = [
  "fastapi",
  "uvicorn",
  "pydantic>=2.10",
]

mongo = [
  "mongoengine>=2.0",
]

[project.urls]
Homepage = "https://github.com/Platob/Yggdrasil"
Repository = "https://github.com/Platob/Yggdrasil"
Documentation = "https://github.com/Platob/Yggdrasil"

[project.scripts]
ygg-api = "yggdrasil.fastapi.main:main"

[tool.setuptools]
package-dir = { "" = "src" }
license-files = ["LICENSE"]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
yggdrasil = ["py.typed"]

[tool.uv]
native-tls = true

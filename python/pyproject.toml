[build-system]
# Cython-compiled accelerators ship inside `ygg` itself: the .pyx
# sources live next to the Python modules they accelerate (see
# ``python/src/yggdrasil/io/_url.pyx``), get compiled to .so files at
# build time via ``python/setup.py`` (``cythonize`` driving setuptools),
# and are imported with a pure-Python fallback so editable installs
# without a C toolchain still work. Wheels are now platform-specific.
requires = ["setuptools>=69", "wheel", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ygg"
version = "0.7.66"
description = "Type-friendly utilities for moving data between Python objects, Arrow, Polars, Pandas, Spark, and Databricks"
readme = { file = "README.md", content-type = "text/markdown" }
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Yggdrasil contributors" }]
keywords = ["arrow", "polars", "pandas", "spark", "databricks", "typing", "dataclass", "serialization"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Typing :: Typed",
]
dependencies = [
  "pyarrow>=20",
  "polars>=1.3",
  "xxhash",
  "orjson>=3.10",
  "urllib3",
]

[project.optional-dependencies]
# --- local dev tooling ---
dev = [
  "pytest",
  "pytest-asyncio",
  "black",
  "ruff",
  "mypy",
  "maturin>=1.7",
  "twine",
  "mkdocs>=1.6",
  "mkdocs-material>=9.5",
  "mkdocstrings[python]>=0.30",
  "mkdocs-gen-files>=0.5",
  "mkdocs-literate-nav>=0.6",
  "mkdocs-section-index>=0.3",
  "cffi",
  "xxhash",
  "pandas>=2.1",
  "polars>=1.3",
  "numpy>=1.26",
  "databricks-sdk>=0.97",
  "sqlglot",
]

http = [
  "urllib3",
  "xxhash",
]

data = [
  "pandas>=2.1",
  "numpy>=1.26",
  "sqlglot",
]

bigdata = [
  "pyspark>=4.0",
]

delta = [
  "deltalake>=1.0",
]

databricks = [
  "databricks-sdk>=0.107",
]

pickle = [
  "cloudpickle",
  "dill>=0.4",
  "zstandard",
  "xxhash",
  "blake3",
]

api = [
  "fastapi",
  "uvicorn",
  "pydantic>=2.10",
]

mongo = [
  "pymongo>=4.5",
  "pymongoarrow>=1.3",
  "mongoengine>=0.29",
]

kafka = [
  "confluent-kafka>=2.4",
]

excel = [
  "fastexcel",
  "openpyxl",
]

sql = [
  "sqlglot",
]

postgres = [
  "psycopg[binary]>=3.1",
  "adbc-driver-postgresql>=1.0",
  "adbc-driver-manager>=1.0",
]

[project.urls]
Homepage = "https://github.com/Platob/Yggdrasil"
Repository = "https://github.com/Platob/Yggdrasil"
Documentation = "https://platob.github.io/Yggdrasil/"

[project.scripts]
ygg-api = "yggdrasil.fastapi.main:main"

# ── setuptools ────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "strict"
markers = [
  "integration: marks tests that require a live Databricks workspace (skipped when DATABRICKS_HOST is not set)",
  "postgres_integration: marks tests that require a live Postgres instance (skipped when POSTGRES_URI is not set)",
  "mongo_integration: marks tests that require a live MongoDB instance (skipped when MONGO_URI / MONGODB_URI is not set)",
]

[tool.setuptools]
package-dir = { "" = "src" }
license-files = ["LICENSE"]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
yggdrasil = ["py.typed"]

[tool.setuptools.exclude-package-data]
# Keep generated Cython artefacts out of the wheel — the .so is the
# compiled product; the .c / .html dumps are build side-effects.
"*" = ["*.c", "*.html", "*.pyx"]

[tool.uv]
native-tls = true

# ---------------------------------------------------------------------------
# cibuildwheel — drives the native wheel matrix from publish.yml.
# ---------------------------------------------------------------------------
# Wheels are built per (cpython × platform) combination so a normal
# ``pip install ygg`` lands the compiled ``yggdrasil/io/_url.so``
# without needing a C toolchain on the user's machine. PyPy is skipped
# (the codebase targets CPython-only fast paths through pyarrow / Cython);
# 32-bit i686 wheels are skipped too — manylinux2014 + arm64 cover what
# the data plane actually runs on. ``musllinux_*`` is left in for Alpine
# / distroless containers.
[tool.cibuildwheel]
# Python ABI tags to build: cpython 3.10 through 3.13. Update when
# pyproject's ``requires-python`` floor moves.
build = "cp310-* cp311-* cp312-* cp313-*"
skip = [
  "pp*",        # PyPy — no compiled-extension contract we maintain
  "*-win32",    # 32-bit windows, no real users
  "*_i686",     # 32-bit linux likewise
]
# Smoke-test the freshly-built wheel by exercising the Cython kernel
# through the matching Python module. Keeps the wheel honest before
# upload (cibuildwheel does this in a clean per-wheel virtualenv).
test-command = "python -c \"from yggdrasil.io.url import URL; assert URL.from_str('https://Example.com/p?b=2&a=1').host == 'example.com'\""
build-verbosity = 1

[tool.cibuildwheel.linux]
# manylinux2014 covers every glibc the project supports; musllinux_1_2
# covers Alpine / distroless. Both ABIs are produced for x86_64 and
# aarch64 so containerised callers don't have to compile.
manylinux-x86_64-image = "manylinux2014"
manylinux-aarch64-image = "manylinux2014"
musllinux-x86_64-image = "musllinux_1_2"
musllinux-aarch64-image = "musllinux_1_2"
archs = ["auto"]

[tool.cibuildwheel.macos]
# arm64 + x86_64 wheels — the GH Actions matrix picks the right runner
# (macos-14 for arm64, macos-13 for x86_64) so cibuildwheel inherits
# the host arch.
archs = ["auto"]

[tool.cibuildwheel.windows]
archs = ["auto64"]
